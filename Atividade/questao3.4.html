<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */
    .flag > div > div > p {
         color: #000000;
        font-size: 3rem;
        text-align: center;
        margin: 0;
        line-height: 200px;
        font-weight: bold;
    }
    .flag{
        width: 900px;
        height: 600px;
        position: relative;
        background-color: red;
    }
    .flag > div {
        background-color: #002868;
        width: 900px;
        height: 300px;
        position: absolute;
        top: 150px;
    }
    .flag > div > div {
  width: 200px;
  height: 200px;
  background-color: #ffffff;
  border-radius: 50%;
  position: relative;
  top: 50px;
  left: 350px;
}
    .flag>p{
        color: white;
        text-align: center;
        font-size: 70px;
    }
    
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
