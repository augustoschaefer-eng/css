<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet" />
  
    <style>
      body {
        font-family: "Sono", sans-serif;
        background-color: #f2f2f2;
      }

     
      .pricing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        height: 100vh;
      }

      .pricing-plan {
        background-color: #e6e6e6;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        width: 250px;
       }

       .plan-title{
        font-weight: bold;
       }

       .plan-price{
        font-weight: bold;
        font-size: 1.8rem;
        margin-bottom: 10px;
       }

       .plan-button {
        background-color: orange;
        border: none;
        padding: 10px 15px;
        color: white;
        border-radius: 5px;
        cursor: pointer;
       }

       .plan-features li{
        list-style: none;
        margin-bottom: 15px;
        padding: 0;
        }

        .plan-features li {
         margin: 5px 0;
         align-items: center;
        }
    
      /* Dica: O que você consegue fazer com media query e flexbox ? */
      @media (max-width: 600px) {
    .pricing-container {
        flex-direction: column;
        height: auto;
        padding: 20px;
        }
    }
      
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>

      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>

      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
