<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>
<body>
    <h1>cadastrando dados</h1>
    <p>preencha os dados para proseguir</p>

    <form action="resultado.html" method="get">
        <label for="nome">Nome completo:</label><br>
        <input type="text" id = "nome" name="usuario" required>
        <br><br>

        <label for="curso">Curso de interrese:</label><br>
        <select name="materia" id="cruso">
            <option value="logistica">logistica</option>
            <option value="desenvolvimento">desenvolvimento</option>
            <option value="mecânica">mecânica</option>
        </select>
        <br><br>

        <button type = "submit">Enviar dados</button>

    </form>
    
</body>
</html>
